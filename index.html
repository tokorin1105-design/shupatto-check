<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シュパッとチェック 〜パコちゃんとお出かけ〜 🐶</title>
    <style>
        :root {
            --bg-pastel-blue: #e3f2fd;
            --phone-bg: #fdfbf7;
            --main-brown: #6d4c41;
            --text-color: #4e342e;
            --pastel-orange: #ffcc80;
            --pastel-orange-hover: #ffb74d;
            --pastel-blue-btn: #b3e5fc;
            --pastel-blue-active: #81d4fa;
            --white: #ffffff;
            --border-color: #efebe9;
            --timer-bg: #fff3e0;
            --timer-color: #e65100;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
        }

        body {
            background-color: var(--bg-pastel-blue);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* スマホ外枠 */
        .phone-frame {
            width: 375px;
            height: 760px;
            background: var(--phone-bg);
            border: 12px solid #3e2723;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ステータスバー */
        .status-bar {
            height: 24px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            color: var(--main-brown);
            background: rgba(255, 255, 255, 0.5);
            z-index: 10;
        }

        /* タイトル画面 */
        .title-screen {
            position: absolute;
            top: 24px;
            left: 0;
            width: 100%;
            height: calc(100% - 24px);
            background: linear-gradient(135deg, #e3f2fd 0%, #ffcc80 100%);
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: transform 0.5s ease-in-out;
        }

        .title-screen.fade-out {
            transform: translateY(-100%);
        }

        .title-logo {
            font-size: 26px;
            font-weight: bold;
            color: var(--main-brown);
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px var(--white);
            line-height: 1.4;
        }

        .title-sub {
            font-size: 13px;
            color: #8d6e63;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* 🐶 パコちゃんのオリジナルイラスト表示エリア */
        .character-art-container {
            width: 180px;
            height: 180px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: floatAnime 1.5s infinite alternate ease-in-out;
        }

        .character-art-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes floatAnime {
            from { transform: translateY(0) rotate(-2deg); }
            to { transform: translateY(-10px) rotate(2deg); }
        }

        /* スタートボタン */
        .start-btn {
            background-color: var(--main-brown);
            color: var(--white);
            border: 3px solid var(--white);
            padding: 14px 45px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0px #3e2723;
            transition: all 0.1s;
        }

        .start-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0px #3e2723;
        }

        /* アプリ本編 */
        .phone-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        header {
            text-align: center;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 18px;
            color: var(--main-brown);
            font-weight: bold;
        }

        /* パコちゃんの吹き出しボード */
        .game-char-board {
            background: #fff8e1;
            border: 2px dashed var(--pastel-orange);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 本編内のアイコンもイラストを小さく表示 */
        .char-avatar {
            width: 55px;
            height: 55px;
            background: var(--white);
            border-radius: 50px;
            border: 2px solid var(--pastel-orange);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 4px;
        }

        .char-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .char-dialogue {
            flex: 1;
            background: var(--white);
            border: 2px solid #bcaaa4;
            border-radius: 12px;
            padding: 8px 10px;
            font-size: 12px;
            font-weight: bold;
            position: relative;
        }

        .char-dialogue::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 18px;
            border-top: 6px solid transparent;
            border-right: 8px solid #bcaaa4;
            border-bottom: 6px solid transparent;
        }

        /* 操作パネル */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            background: #fafaf9;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #f5f2eb;
        }

        .weather-box, .timer-box { display: flex; flex-direction: column; gap: 4px; }
        .weather-display { font-size: 11px; font-weight: bold; }
        .weather-btns, .timer-btns { display: flex; gap: 3px; }

        .w-btn, .t-btn {
            border: none;
            padding: 5px 6px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            background: #efebe9;
            color: #8d6e63;
        }
        .w-btn.active { background: var(--pastel-orange); color: var(--text-color); }
        .t-btn { background: #ffe0b2; color: var(--timer-color); }

        .timer-display-text {
            font-size: 13px;
            font-weight: bold;
            color: var(--timer-color);
            text-align: center;
        }

        .section-title { font-size: 12px; color: #8d6e63; margin-bottom: 6px; font-weight: bold; }
        .cat-section { margin-bottom: 16px; background: #f5f5f4; padding: 12px; border-radius: 16px; }
        .tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .tab-btn { border: none; padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; background-color: #efebe9; color: #8d6e63; display: flex; align-items: center; gap: 4px; }
        .tab-btn.active { background-color: var(--pastel-blue-active); color: var(--text-color); }
        .tab-btn .del-cat-btn { background: none; border: none; color: rgba(0,0,0,0.3); font-size: 14px; cursor: pointer; margin-left: 2px; }
        .add-cat-box { display: flex; gap: 6px; }
        .input-sm { flex: 1; padding: 6px 10px; border: 2px solid #efebe9; border-radius: 8px; font-size: 12px; outline: none; }
        .btn-sm { background-color: var(--main-brown); color: var(--white); border: none; padding: 0 10px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .add-box { display: flex; gap: 6px; margin-bottom: 16px; }
        .add-input { flex: 1; padding: 10px 12px; border: 2px solid #efebe9; border-radius: 12px; font-size: 13px; outline: none; }
        .add-btn { background-color: var(--pastel-orange); color: var(--text-color); border: none; padding: 0 14px; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .cat-select { padding: 0 6px; border: 2px solid #efebe9; border-radius: 12px; font-size: 12px; color: var(--text-color); outline: none; background: var(--white); }
        .list-container { min-height: 120px; margin-bottom: 16px; }
        .item-row { display: flex; align-items: center; background-color: var(--white); border: 1px solid #f5f2eb; padding: 12px 14px; border-radius: 12px; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.01); }
        .item-row.checked { opacity: 0.4; background-color: #f5f5f4; }
        .checkbox-custom { width: 20px; height: 20px; border: 2px solid #d7ccc8; border-radius: 6px; margin-right: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: var(--white); }
        .item-row.checked .checkbox-custom { background-color: #a5d6a7; border-color: #a5d6a7; }
        .item-row.checked .checkbox-custom::after { content: '✓'; color: var(--white); font-size: 12px; font-weight: bold; }
        .item-text-wrapper { flex: 1; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; padding-right: 6px; }
        .item-text { font-size: 14px; }
        .item-row.checked .item-text { text-decoration: line-through; color: #8d6e63; }
        .cat-badge { font-size: 9px; background-color: var(--bg-pastel-blue); color: #0288d1; padding: 2px 6px; border-radius: 20px; font-weight: bold; }
        .cat-badge.weather-badge { background-color: #ffe0b2; color: var(--timer-color); }
        .delete-btn { background: none; border: none; color: #d7ccc8; font-size: 16px; cursor: pointer; }
        .footer-btns { display: flex; justify-content: center; margin-bottom: 10px; }
        .reset-btn { background-color: var(--main-brown); color: var(--white); border: none; padding: 10px 24px; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .empty-msg { text-align: center; color: #bcaaa4; font-size: 13px; padding-top: 30px; }
    </style>
</head>
<body>

<div class="phone-frame">
    <!-- スマホステータスバー -->
    <div class="status-bar">
        <div id="statusTime">08:00</div>
        <div class="status-icons"><span>📶</span><span>🛜</span><span>🔋 85%</span></div>
    </div>

    <!-- 🐶 パコちゃん仕様のオープニング画面（画像読み込み版） -->
    <div class="title-screen" id="titleScreen">
        <div class="title-logo">シュパッとチェック</div>
        <div class="title-sub">〜ポシェット犬 パコちゃんとお出かけ〜</div>
        
        <!-- ふわふわ浮かぶパコちゃんイラスト -->
        <div class="character-art-container">
            <img src="pako-char.png" alt="パコちゃん" class="character-art-img">
        </div>
        
        <button class="start-btn" onclick="startGame()">じゅんびをはじめる</button>
    </div>

    <!-- アプリ本編 -->
    <div class="phone-content">
        <header>
            <h1>シュパッとチェック</h1>
        </header>

        <!-- 🐶 キャラクター吹き出しボード -->
        <div class="game-char-board">
            <div class="char-avatar" id="charAvatar">
                <img src="pako-char.png" alt="パコちゃんアイコン">
            </div>
            <div class="char-dialogue" id="charMsg">クンクン…！忘れ物のにおいがするワン！一緒にポシェットを確認しよう！</div>
        </div>

        <!-- 操作パネル（天気＆タイマー） -->
        <div class="controls-row">
            <div class="weather-box">
                <div class="weather-display" id="weatherDisplay">☀️ 晴れ / 26℃</div>
                <div class="weather-btns">
                    <button class="w-btn active" id="btnSunny" onclick="setWeather('sunny')">晴れ</button>
                    <button class="w-btn" id="btnRainy" onclick="setWeather('rainy')">雨 ☔</button>
                </div>
            </div>
            <div class="timer-box">
                <div class="timer-display-text" id="timerDisplay">出発まで --:--</div>
                <div class="timer-btns">
                    <button class="t-btn" onclick="startTimer(5)">5分</button>
                    <button class="t-btn" onclick="startTimer(10)">10分</button>
                    <button class="t-btn" onclick="stopTimer()">停止</button>
                </div>
            </div>
        </div>

        <!-- シチュエーション管理 -->
        <div class="cat-section">
            <div class="section-title">今日行くところ</div>
            <div id="tabsContainer" class="tabs"></div>
            <div class="add-cat-box">
                <input type="text" id="newCatInput" class="input-sm" placeholder="新しい場所を追加..." onkeypress="handleCatKeyPress(event)">
                <button class="btn-sm" onclick="addCategory()">追加</button>
            </div>
        </div>

        <!-- 持ち物追加 -->
        <div class="section-title">持ち物を追加する</div>
        <div class="add-box">
            <select id="catSelect" class="cat-select"></select>
            <input type="text" id="itemInput" class="add-input" placeholder="忘れそうなものを入力..." onkeypress="handleItemKeyPress(event)">
            <button class="add-btn" onclick="addItem()">追加</button>
        </div>

        <!-- リスト表示 -->
        <div class="section-title">今日の持ち物リスト</div>
        <div id="listContainer" class="list-container"></div>

        <div class="footer-btns">
            <button class="reset-btn" onclick="resetChecks()">すべてのチェックを外す</button>
        </div>
    </div>
</div>

<script>
    let categories = ["大学", "バイト", "お出かけ"];
    let activeCategories = ["大学", "バイト", "お出かけ"];
    let currentWeather = 'sunny';
    let countdownInterval;

    let itemsMaster = [
        { text: "学生証", cat: "大学", checked: false },
        { text: "ノートPC", cat: "大学", checked: false },
        { text: "筆記用具", cat: "大学", checked: false },
        { text: "財布", cat: "大学", checked: false },
        { text: "制服", cat: "バイト", checked: false },
        { text: "メモ帳", cat: "バイト", checked: false },
        { text: "財布", cat: "お出かけ", checked: false },
        { text: "スマホ", cat: "お出かけ", checked: false },
        { text: "リップ", cat: "お出かけ", checked: false },
        { text: "モバイルバッテリー", cat: "お出かけ", checked: false },
        { text: "イヤホン", cat: "お出かけ", checked: false }
    ];

    const rainyItems = [
        { text: "折りたたみ傘", cat: "雨の日の持ち物", checked: false },
        { text: "ミニタオル", cat: "雨の日の持ち物", checked: false }
    ];

    function startGame() {
        document.getElementById('titleScreen').classList.add('fade-out');
        setCharMessage("じゅんび開始だワン！ボクのポシェットには何を入れる？");
    }

    function setCharMessage(msg) {
        document.getElementById('charMsg').textContent = msg;
    }

    function setWeather(weather) {
        currentWeather = weather;
        const display = document.getElementById('weatherDisplay');
        const btnSunny = document.getElementById('btnSunny');
        const btnRainy = document.getElementById('btnRainy');

        if (weather === 'sunny') {
            display.innerHTML = "☀️ 晴れ / 26℃";
            btnSunny.classList.add('active');
            btnRainy.classList.remove('active');
            setCharMessage("お外はあったかいワン！元気にいってらっしゃい！");
        } else {
            display.innerHTML = "☔ 雨 / 21℃";
            btnSunny.classList.remove('active');
            btnRainy.classList.add('active');
            setCharMessage("あ、雨だ！お気に入りの傘、ポシェットに入れた？");
        }
        renderList();
    }

    function startTimer(minutes) {
        clearInterval(countdownInterval);
        let timeRemaining = minutes * 60;
        const display = document.getElementById('timerDisplay');
        
        setCharMessage(`あと ${minutes} 分でお出かけの時間だワン！いそげ〜！`);

        function updateTimerDisplay() {
            let mins = Math.floor(timeRemaining / 60);
            let secs = timeRemaining % 60;
            display.textContent = `出発まで ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        updateTimerDisplay();

        countdownInterval = setInterval(() => {
            timeRemaining--;
            if (timeRemaining <= 0) {
                clearInterval(countdownInterval);
                display.textContent = "お出かけの時間！";
                setCharMessage("ワンワン！時間だワン！忘れ物がないならシュパッと出発！");
                alert("⏰ 時間です！いってらっしゃい！");
            } else {
                updateTimerDisplay();
                if(timeRemaining === 60) {
                    setCharMessage("うわぁ、あと1分ワン！ラストスパートだワン！");
                }
            }
        }, 1000);
    }

    function stopTimer() {
        clearInterval(countdownInterval);
        document.getElementById('timerDisplay').textContent = "出発まで --:--";
        setCharMessage("タイマーが止まったワン。落ち着いて用意してね。");
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('statusTime').textContent = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    }

    window.onload = function() {
        updateClock();
        setInterval(updateClock, 60000);

        const savedCats = localStorage.getItem('shupatto_cats_v7');
        const savedItems = localStorage.getItem('shupatto_items_v7');
        const savedActive = localStorage.getItem('shupatto_active_cats_v7');
        
        if (savedCats) categories = JSON.parse(savedCats);
        if (savedItems) itemsMaster = JSON.parse(savedItems);
        if (savedActive) activeCategories = JSON.parse(savedActive);

        renderTabs();
        renderSelect();
        renderList();
    };

    function saveData() {
        localStorage.setItem('shupatto_cats_v7', JSON.stringify(categories));
        localStorage.setItem('shupatto_items_v7', JSON.stringify(itemsMaster));
        localStorage.setItem('shupatto_active_cats_v7', JSON.stringify(activeCategories));
    }

    // （以下、変更前のロジックと同様の関数群）
    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        container.innerHTML = '';
        categories.forEach(cat => {
            const isActive = activeCategories.includes(cat);
            const btn = document.createElement('button');
            btn.className = `tab-btn ${isActive ? 'active' : ''}`;
            btn.addEventListener('click', (e) => {
                if(e.target.className === 'del-cat-btn') return;
                toggleCategoryActive(cat);
            });
            btn.innerHTML = `${escapeHTML(cat)}<span class="del-cat-btn" onclick="deleteCategory('${cat}')">×</span>`;
            container.appendChild(btn);
        });
    }

    function toggleCategoryActive(cat) {
        const index = activeCategories.indexOf(cat);
        if (index > -1) {
            activeCategories.splice(index, 1);
        } else {
            activeCategories.push(cat);
        }
        saveData();
        renderTabs();
        renderList();
    }

    function renderSelect() {
        const select = document.getElementById('catSelect');
        select.innerHTML = '';
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            select.appendChild(opt);
        });
    }

    function renderList() {
        const container = document.getElementById('listContainer');
        container.innerHTML = '';

        let displayItems = itemsMaster.filter(item => activeCategories.includes(item.cat))
                            .map(item => ({...item, isWeatherItem: false, originalIndex: itemsMaster.indexOf(item)}));

        if (currentWeather === 'rainy') {
            const weatherItems = rainyItems.map((item, index) => ({...item, isWeatherItem: true, originalIndex: index}));
            displayItems = [...weatherItems, ...displayItems];
        }

        if (displayItems.length === 0) {
            container.innerHTML = '<div class="empty-msg">持ち物がありません。<br>上のボタンで場所を選んでね！</div>';
            return;
        }

        let checkedCount = 0;

        displayItems.forEach((item) => {
            if (item.checked) checkedCount++;

            const row = document.createElement('div');
            row.className = `item-row ${item.checked ? 'checked' : ''}`;

            const clickAction = item.isWeatherItem ? `toggleWeatherCheck(${item.originalIndex})` : `toggleCheck(${item.originalIndex})`;
            const deleteButton = item.isWeatherItem ? '' : `<button class="delete-btn" onclick="deleteItem(${item.originalIndex})">×</button>`;
            const badgeClass = item.isWeatherItem ? 'cat-badge weather-badge' : 'cat-badge';

            row.innerHTML = `
                <div class="checkbox-custom" onclick="${clickAction}"></div>
                <div class="item-text-wrapper" onclick="${clickAction}">
                    <span class="item-text">${escapeHTML(item.text)}</span>
                    <span class="${badgeClass}">${escapeHTML(item.cat)}</span>
                </div>
                ${deleteButton}
            `;
            container.appendChild(row);
        });

        if (checkedCount === displayItems.length && displayItems.length > 0) {
            setCharMessage("🎉 やったワン！全部そろった！これでお出かけ大成功だね！");
        }
    }

    function toggleCheck(masterIndex) {
        itemsMaster[masterIndex].checked = !itemsMaster[masterIndex].checked;
        saveData();
        renderList();
    }

    function toggleWeatherCheck(weatherIndex) {
        rainyItems[weatherIndex].checked = !rainyItems[weatherIndex].checked;
        renderList();
    }

    function addCategory() {
        const input = document.getElementById('newCatInput');
        const catName = input.value.trim();
        if (catName === '' || categories.includes(catName)) return;
        categories.push(catName);
        activeCategories.push(catName);
        input.value = '';
        saveData();
        renderTabs();
        renderSelect();
        renderList();
    }

    function deleteCategory(cat) {
        if(confirm(`「${cat}」を削除しますか？`)) {
            categories = categories.filter(c => c !== cat);
            activeCategories = activeCategories.filter(c => c !== cat);
            itemsMaster = itemsMaster.filter(item => item.cat !== cat);
            saveData();
            renderTabs();
            renderSelect();
            renderList();
        }
    }

    function addItem() {
        const input = document.getElementById('itemInput');
        const select = document.getElementById('catSelect');
        const text = input.value.trim();
        const cat = select.value;
        if (text === '' || !cat) return;
        itemsMaster.push({ text: text, cat: cat, checked: false });
        input.value = '';
        saveData();
        renderList();
    }

    function deleteItem(masterIndex) {
        itemsMaster.splice(masterIndex, 1);
        saveData();
        renderList();
    }

    function resetChecks() {
        itemsMaster.forEach(item => {
            if (activeCategories.includes(item.cat)) item.checked = false;
        });
        rainyItems.forEach(item => item.checked = false);
        saveData();
        renderList();
        setCharMessage("チェックをリセットしたワン。もう一回確認しよう！");
    }

    function handleCatKeyPress(e) { if (e.key === 'Enter') addCategory(); }
    function handleItemKeyPress(e) { if (e.key === 'Enter') addItem(); }
    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' }[m]));
    }
</script>
</body>
</html>
